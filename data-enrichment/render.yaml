services:
  - type: cron
    name: enrich-stores
    runtime: python
    schedule: "0 2 * * *"  # Every day at 2am UTC
    buildCommand: pip install -r data-enrichment/requirements-enrichment.txt
    startCommand: python data-enrichment/enrich_stores.py
    envVars:
      - key: SHEET_KEY
        sync: false  # means you set the value manually in Render dashboard
      - key: GOOGLE_MAPS_API_KEY
        sync: false