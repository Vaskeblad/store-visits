<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Visits</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    header p  { font-size: 0.78rem; opacity: 0.6; margin-top: 2px; }

    /* Filter bar */
    .filters {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      background: #fff;
      border-bottom: 1px solid #e8eaf0;
      position: sticky;
      top: 62px;
      z-index: 9;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #dde1ea;
      background: #fff;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }

    /* Store list */
    main { padding: 12px 14px 80px; }

    .store-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .store-card:active { transform: scale(0.985); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .store-name { font-size: 1rem; font-weight: 700; }
    .store-area { font-size: 0.78rem; color: #777; margin-top: 2px; }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-Visited      { background: #d1fae5; color: #065f46; }
    .badge-Follow-up    { background: #fef3c7; color: #92400e; }
    .badge-Pending      { background: #e0e7ff; color: #3730a3; }
    .badge-Not-visited  { background: #fee2e2; color: #991b1b; }

    .card-meta {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      font-size: 0.75rem;
      color: #888;
    }
    .card-meta span { display: flex; align-items: center; gap: 4px; }

    .priority-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .priority-High   { background: #ef4444; }
    .priority-Medium { background: #f59e0b; }
    .priority-Low    { background: #6b7280; }

    /* Loading / empty state */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 0.9rem;
    }

    /* Drawer overlay */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 20;
    }
    .overlay.open { display: block; }

    /* Bottom drawer */
    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 20px 20px 36px;
      z-index: 21;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      max-height: 85vh;
      overflow-y: auto;
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 40px; height: 4px;
      background: #dde1ea;
      border-radius: 4px;
      margin: 0 auto 16px;
    }
    .drawer-store-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .drawer-area       { font-size: 0.8rem; color: #777; margin-bottom: 18px; }

    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #aaa;
      margin-bottom: 8px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .status-opt {
      border: 2px solid #e8eaf0;
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }
    .status-opt.selected {
      border-color: #1a1a2e;
      background: #1a1a2e;
      color: #fff;
    }

    .contact-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #f0f2f5;
      font-size: 0.84rem;
    }
    .contact-row .label { color: #888; }
    .contact-row a { color: #1a1a2e; text-decoration: none; font-weight: 600; }

    textarea {
      width: 100%;
      border: 1.5px solid #e8eaf0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.85rem;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      min-height: 90px;
      margin-bottom: 16px;
    }
    textarea:focus { border-color: #1a1a2e; }

    .followup-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    .followup-row label { font-size: 0.8rem; color: #888; white-space: nowrap; }
    .followup-row input[type="date"] {
      flex: 1;
      border: 1.5px solid #e8eaf0;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
    }
    .followup-row input[type="date"]:focus { border-color: #1a1a2e; }

    .save-btn {
      width: 100%;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .save-btn:active { opacity: 0.8; }
    .save-btn:disabled { opacity: 0.5; cursor: default; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a2e;
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 30;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<header>
  <h1>Store Visits</h1>
  <p id="subtitle">Loading stores...</p>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="All">All</button>
  <button class="filter-btn" data-filter="Visited">Visited</button>
  <button class="filter-btn" data-filter="Follow-up">Follow-up</button>
  <button class="filter-btn" data-filter="Pending">Pending</button>
  <button class="filter-btn" data-filter="Not visited">Not visited</button>
</div>

<main id="store-list">
  <div class="state-msg">Loading...</div>
</main>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-store-name" id="d-name"></div>
  <div class="drawer-area" id="d-area"></div>

  <div class="section-label">Status</div>
  <div class="status-grid" id="status-grid">
    <div class="status-opt" data-s="Visited">Visited</div>
    <div class="status-opt" data-s="Follow-up">Follow-up</div>
    <div class="status-opt" data-s="Pending">Pending</div>
    <div class="status-opt" data-s="Not visited">Not visited</div>
  </div>

  <div class="contact-row">
    <span class="label">Contact</span>
    <span id="d-contact">—</span>
  </div>
  <div class="contact-row">
    <span class="label">Phone</span>
    <a href="#" id="d-phone">—</a>
  </div>

  <div class="section-label" style="margin-top:18px">Next Follow-up</div>
  <div class="followup-row">
    <input type="date" id="d-followup" />
  </div>

  <div class="section-label">Notes</div>
  <textarea id="d-notes" placeholder="Add notes about this visit..."></textarea>

  <button class="save-btn" id="save-btn">Save Changes</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = "http://localhost:5000";

  let stores = [];
  let activeFilter = "All";
  let currentStore = null;

  // --- Load stores ---
  async function loadStores() {
    try {
      const res = await fetch(`${API}/stores`);
      stores = await res.json();
      renderList();
    } catch (e) {
      document.getElementById("store-list").innerHTML =
        '<div class="state-msg">Could not connect to server.</div>';
    }
  }

  function renderList() {
    const list = document.getElementById("store-list");
    const filtered = activeFilter === "All"
      ? stores
      : stores.filter(s => s.status === activeFilter);

    const counts = stores.reduce((acc, s) => {
      acc[s.status] = (acc[s.status] || 0) + 1;
      return acc;
    }, {});
    const visited = counts["Visited"] || 0;
    document.getElementById("subtitle").textContent =
      `${visited} of ${stores.length} visited`;

    if (filtered.length === 0) {
      list.innerHTML = '<div class="state-msg">No stores match this filter.</div>';
      return;
    }

    list.innerHTML = filtered.map(s => `
      <div class="store-card" data-row="${s.row}">
        <div class="card-top">
          <div>
            <div class="store-name">${esc(s.store_name)}</div>
            <div class="store-area">${esc(s.area)}</div>
          </div>
          <span class="badge badge-${s.status.replace(/ /g,'-')}">${esc(s.status)}</span>
        </div>
        <div class="card-meta">
          <span>
            <span class="priority-dot priority-${s.priority}"></span>
            ${esc(s.priority)} priority
          </span>
          ${s.last_visited ? `<span>Last: ${esc(s.last_visited)}</span>` : ""}
          ${s.next_followup ? `<span>Next: ${esc(s.next_followup)}</span>` : ""}
        </div>
      </div>
    `).join("");

    list.querySelectorAll(".store-card").forEach(card => {
      card.addEventListener("click", () => openDrawer(Number(card.dataset.row)));
    });
  }

  // --- Filter buttons ---
  document.getElementById("filters").addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderList();
  });

  // --- Drawer ---
  function openDrawer(row) {
    currentStore = stores.find(s => s.row === row);
    if (!currentStore) return;

    document.getElementById("d-name").textContent = currentStore.store_name;
    document.getElementById("d-area").textContent = currentStore.area;
    document.getElementById("d-contact").textContent = currentStore.contact || "—";

    const phoneEl = document.getElementById("d-phone");
    if (currentStore.phone) {
      phoneEl.textContent = currentStore.phone;
      phoneEl.href = `tel:${currentStore.phone}`;
    } else {
      phoneEl.textContent = "—";
      phoneEl.href = "#";
    }

    document.getElementById("d-followup").value = currentStore.next_followup || "";
    document.getElementById("d-notes").value = currentStore.notes || "";

    document.querySelectorAll(".status-opt").forEach(opt => {
      opt.classList.toggle("selected", opt.dataset.s === currentStore.status);
    });

    document.getElementById("overlay").classList.add("open");
    document.getElementById("drawer").classList.add("open");
  }

  function closeDrawer() {
    document.getElementById("overlay").classList.remove("open");
    document.getElementById("drawer").classList.remove("open");
    currentStore = null;
  }

  document.getElementById("overlay").addEventListener("click", closeDrawer);

  document.querySelectorAll(".status-opt").forEach(opt => {
    opt.addEventListener("click", () => {
      document.querySelectorAll(".status-opt").forEach(o => o.classList.remove("selected"));
      opt.classList.add("selected");
    });
  });

  // --- Save ---
  document.getElementById("save-btn").addEventListener("click", async () => {
    if (!currentStore) return;
    const btn = document.getElementById("save-btn");
    const selectedStatus = document.querySelector(".status-opt.selected")?.dataset.s;

    const payload = {
      status: selectedStatus,
      notes: document.getElementById("d-notes").value,
      next_followup: document.getElementById("d-followup").value,
    };

    btn.disabled = true;
    btn.textContent = "Saving...";

    try {
      const res = await fetch(`${API}/stores/${currentStore.row}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (data.ok) {
        // Update local state
        Object.assign(currentStore, {
          status: payload.status,
          notes: payload.notes,
          next_followup: payload.next_followup,
        });
        if (payload.status === "Visited") {
          currentStore.last_visited = new Date().toISOString().slice(0, 10);
        }
        closeDrawer();
        renderList();
        showToast("Saved!");
      } else {
        showToast("Save failed. Try again.");
      }
    } catch {
      showToast("Network error. Try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Save Changes";
    }
  });

  // --- Toast ---
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  }

  // --- Utils ---
  function esc(s) {
    return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  loadStores();
</script>
</body>
</html>
